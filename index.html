<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Mike</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='style.css'>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: light dark;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Inter", "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, rgba(0, 122, 255, 0.15), transparent 55%), #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        main {
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 1.5rem;
            user-select: none;
        }
        .logo .small {
            font-size: 3rem;
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1;
        }
        .logo .big {
            font-size: 12rem;
            font-weight: 900;
            line-height: 0.85;
            position: relative;
            background: linear-gradient(
                135deg,
                #38bdf8 0%,
                #818cf8 25%,
                #f472b6 50%,
                #38bdf8 75%,
                #818cf8 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s ease infinite;
            filter: drop-shadow(0 0 40px rgba(56, 189, 248, 0.4))
                    drop-shadow(0 0 80px rgba(129, 140, 248, 0.2));
        }
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* sparkles */
        .sparkle-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
        }
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle-pop 2.4s ease-in-out infinite;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8),
                        0 0 12px 4px rgba(56, 189, 248, 0.5);
        }
        .sparkle:nth-child(1) { top: 8%; left: 10%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 2%; left: 55%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { top: 70%; left: 85%; animation-delay: 1.0s; }
        .sparkle:nth-child(4) { top: 15%; left: 90%; animation-delay: 1.5s; }
        .sparkle:nth-child(5) { top: 80%; left: 20%; animation-delay: 0.3s; }
        .sparkle:nth-child(6) { top: 45%; left: 5%; animation-delay: 1.8s; }
        .sparkle:nth-child(7) { top: 55%; left: 95%; animation-delay: 0.7s; }
        .sparkle:nth-child(8) { top: 5%; left: 75%; animation-delay: 2.0s; }
        @keyframes sparkle-pop {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.4) rotate(180deg); }
        }

        .big-wrapper {
            position: relative;
            display: inline-block;
        }

        p {
            margin: 0 0 1.5rem;
            color: rgba(226, 232, 240, 0.75);
            font-size: 1.05rem;
        }
        .links {
            display: inline-flex;
            gap: 0.85rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-weight: 600;
            text-decoration: none;
            color: #0f172a;
            background: #38bdf8;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }
        .links a.secondary {
            background: rgba(226, 232, 240, 0.14);
            color: #e2e8f0;
            border: 1px solid rgba(226, 232, 240, 0.2);
        }
        .links a:hover,
        .links a:focus {
            transform: translateY(-3px);
            box-shadow: 0 16px 32px -18px rgba(15, 23, 42, 0.85);
        }
        .links a.secondary:hover,
        .links a.secondary:focus {
            background: rgba(226, 232, 240, 0.22);
        }
    </style>
</head>

<body>
    <main>
        <div class="logo">
            <span class="small">m</span>
            <div class="big-wrapper">
                <span class="big">AI</span>
                <div class="sparkle-container">
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                </div>
            </div>
            <span class="small">k</span>
        </div>
        <div class="links">
            <a href="blog/index.html">Read the blog</a>
            <a class="secondary" href="cv/index.html" rel="noopener">Skim the CV</a>
        </div>
    </main>
</body>
</html>
